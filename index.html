<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Авторизація та Завантаження</title>
    <style>
        /* Скидаємо стандартні відступи */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; /* Сучасний шрифт */
        }

        /* Головний контейнер */
        .layout-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('img/bg.png');
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            --ch: 100vh; 
        }

        /* Контейнери для різних сцен */
        .scene {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Сцена завантаження прихована за замовчуванням */
        #loading-scene {
            display: none;
        }

        /* Спільні стилі для елементів інтерфейсу */
        .ui-element {
            position: absolute;
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
        }

        /* Email */
        #email-wrapper {
            top: calc(165 / 584 * 100%);
            right: calc(31 / 1281 * 100%);
            width: calc(473 / 1281 * 100%);
            height: calc(64 / 584 * 100%);
            background-image: url('img/email.png');
        }

        /* Password */
        #password-wrapper {
            top: calc(245 / 584 * 100%);
            right: calc(31 / 1281 * 100%);
            width: calc(473 / 1281 * 100%);
            height: calc(64 / 584 * 100%);
            background-image: url('img/password.png');
        }

        /* Кнопка Логін */
        #login-btn {
            top: calc(325 / 584 * 100%);
            right: calc(26 / 1281 * 100%);
            width: calc(251 / 1281 * 100%);
            height: calc(63 / 584 * 100%);
            background-image: url('img/login.png');
            background-color: transparent;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
            outline: none;
        }
        
        #login-btn:hover { opacity: 0.8; }
        #login-btn:active { transform: scale(0.98); }

        /* Внутрішні текстові поля */
        .custom-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: calc(var(--ch) * 0.035); 
            padding: 0 5%; 
            box-sizing: border-box;
        }

        /* =========================================
           Елементи екрану завантаження
           ========================================= */
        #progress-track {
            position: absolute;
            top: calc(556 / 584 * 100%);
            left: calc(82 / 1281 * 100%);
            width: calc(1117 / 1281 * 100%);
            height: calc(10 / 584 * 100%);
            background-color: #494949; 
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%; 
            height: 100%;
            background-color: #F1FE3F; 
            box-shadow: 0 0 10px rgba(241, 254, 63, 0.5); /* Легке світіння повзунка */
        }

        /* =========================================
           Сучасне вікно помилки (Glassmorphism)
           ========================================= */
        #error-toast {
            position: absolute;
            bottom: 5%;
            left: 3%;
            /* Дизайн скла (Glassmorphism) */
            background: rgba(40, 5, 5, 0.6); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 60, 60, 0.3);
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
            
            border-radius: 50px; /* Максимальне заокруглення */
            padding: calc(var(--ch) * 0.015) calc(var(--ch) * 0.03);
            display: flex;
            align-items: center;
            gap: calc(var(--ch) * 0.02);
            color: #ffcccc;
            font-size: calc(var(--ch) * 0.025);
            font-weight: 500;
            z-index: 100;
            pointer-events: auto;
            
            /* Анімація виїзду (пружинка) */
            transform: translateX(-150%);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* Клас, який додається через JS для появи */
        #error-toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        /* Іконка оклику */
        .toast-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ff3b3b;
            color: #fff;
            width: calc(var(--ch) * 0.04);
            height: calc(var(--ch) * 0.04);
            border-radius: 50%;
            font-weight: bold;
            font-size: calc(var(--ch) * 0.025);
            box-shadow: 0 0 10px rgba(255, 59, 59, 0.5);
        }

        /* Кнопка закриття (Хрестик) */
        .toast-close {
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            font-size: calc(var(--ch) * 0.03);
            transition: color 0.2s ease;
            margin-left: calc(var(--ch) * 0.01);
        }
        .toast-close:hover {
            color: #fff;
        }

        /* =========================================
           Мобільна адаптація
           ========================================= */
        @media screen and (orientation: portrait) {
            .layout-container {
                width: 100vh;
                height: 100vw;
                top: 0;
                left: 100vw;
                transform-origin: top left;
                transform: rotate(90deg);
                --ch: 100vw; 
            }
        }
    </style>
</head>
<body>

    <div class="layout-container" id="main-container">
        
        <div class="scene" id="login-scene">
            <div id="email-wrapper" class="ui-element">
                <input type="text" id="email" class="custom-input" autocomplete="off">
            </div>

            <div id="password-wrapper" class="ui-element">
                <input type="password" id="password" class="custom-input">
            </div>

            <button id="login-btn" class="ui-element"></button>

            <div id="error-toast">
                <div class="toast-icon">!</div>
                <div class="toast-text">Невірно введені дані</div>
                <div class="toast-close" id="toast-close-btn">✕</div>
            </div>
        </div>

        <div class="scene" id="loading-scene">
            <div id="progress-track">
                <div id="progress-fill"></div>
            </div>
        </div>

    </div>

    <script>
        // Елементи логіну
        const emailInput = document.getElementById('email');
        const emailWrapper = document.getElementById('email-wrapper');
        const passwordInput = document.getElementById('password');
        const passwordWrapper = document.getElementById('password-wrapper');
        const loginBtn = document.getElementById('login-btn');

        // Елементи сцен
        const mainContainer = document.getElementById('main-container');
        const loginScene = document.getElementById('login-scene');
        const loadingScene = document.getElementById('loading-scene');
        const progressFill = document.getElementById('progress-fill');

        // Елементи вікна помилки
        const errorToast = document.getElementById('error-toast');
        const toastCloseBtn = document.getElementById('toast-close-btn');
        let hideToastTimeout; // Змінна для таймера, щоб вікно не блимало

        // Логіка зміни картинок полів вводу (email_h, password_h)
        function updateStates() {
            if (emailInput === document.activeElement || emailInput.value.length > 0) {
                emailWrapper.style.backgroundImage = "url('img/email_h.png')";
            } else {
                emailWrapper.style.backgroundImage = "url('img/email.png')";
            }

            if (passwordInput === document.activeElement || passwordInput.value.length > 0) {
                passwordWrapper.style.backgroundImage = "url('img/password_h.png')";
            } else {
                passwordWrapper.style.backgroundImage = "url('img/password.png')";
            }
        }

        emailInput.addEventListener('focus', updateStates);
        emailInput.addEventListener('blur', updateStates);
        emailInput.addEventListener('input', updateStates);

        passwordInput.addEventListener('focus', updateStates);
        passwordInput.addEventListener('blur', updateStates);
        passwordInput.addEventListener('input', updateStates);
        
        updateStates();

        // Функція для показу помилки
        function showError() {
            // Скидаємо попередній таймер, якщо клікають кілька разів підряд
            clearTimeout(hideToastTimeout);
            
            // Показуємо вікно
            errorToast.classList.add('show');

            // Автоматично ховаємо через 4 секунди
            hideToastTimeout = setTimeout(() => {
                errorToast.classList.remove('show');
            }, 4000);
        }

        // Закриття вікна по хрестику
        toastCloseBtn.addEventListener('click', () => {
            clearTimeout(hideToastTimeout);
            errorToast.classList.remove('show');
        });

        // Логіка натискання на кнопку входу
        loginBtn.addEventListener('click', () => {
            
            // ПЕРЕВІРКА ДАНИХ
            if (emailInput.value === "litynskyiroman2023@gmail.com" && passwordInput.value === "l020712r") {
                
                // Якщо все вірно - запускаємо гру
                loginScene.style.display = 'none';
                mainContainer.style.backgroundImage = "url('img/game_load.png')";
                loadingScene.style.display = 'block';

                const randomLoadTime = Math.floor(Math.random() * (13000 - 7000 + 1)) + 7000;

                setTimeout(() => {
                    progressFill.style.transition = `width ${randomLoadTime}ms linear`;
                    progressFill.style.width = '100%';
                }, 50);

                setTimeout(() => {
                    window.location.href = 'game.html';
                }, randomLoadTime + 50);

            } else {
                // Якщо дані НЕ вірні - показуємо гарну помилку
                showError();
            }
        });
    </script>

</body>
</html>
