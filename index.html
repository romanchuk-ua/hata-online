<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Авторизація</title>
    <style>
        /* Базові стилі для повного екрану */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f0f12; /* Темний фон поза макетом */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Головний контейнер за розміром Figma-фрейму */
        .page-container {
            position: relative;
            width: 1281px;
            height: 584px;
            background-image: url('img/bg.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease; /* Плавний поворот при зміні орієнтації екрану */
        }

        /* Стилі для обгорток Email та Password */
        .input-wrapper {
            position: absolute;
            right: 31px;
            width: 473px;
            height: 64px;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
        }

        #email-wrapper {
            top: 165px;
            background-image: url('img/email.png');
        }

        #password-wrapper {
            top: 245px;
            background-image: url('img/password.png');
        }

        /* Стилі для самих інпутів всередині картинок */
        .custom-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 16px;
            padding: 0 24px;
            box-sizing: border-box;
        }

        /* Кнопка Логіну */
        #login-btn {
            position: absolute;
            top: 325px;
            right: 26px;
            width: 251px;
            height: 63px;
            background-image: url('img/login.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-color: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.1s ease;
        }

        #login-btn:hover {
            opacity: 0.9;
        }
        #login-btn:active {
            transform: scale(0.98);
        }

        /* =======================================================
           Мобільна адаптація (розворот на 90 градусів)
           ======================================================= */
        @media screen and (orientation: portrait) {
            .page-container {
                /* Розвертаємо макет на 90 градусів і зменшуємо його, щоб він вліз у вертикальний екран */
                transform: rotate(90deg) scale(0.65);
            }
        }
        
        /* Додатково: якщо телефон лежить горизонтально, але екран замалий для 1281px */
        @media screen and (orientation: landscape) and (max-width: 1300px) {
            .page-container {
                transform: scale(0.7); /* Просто зменшуємо, не розвертаючи */
            }
        }
    </style>
</head>
<body>

    <div class="page-container">
        
        <div id="email-wrapper" class="input-wrapper">
            <input type="text" id="email" class="custom-input" autocomplete="off">
        </div>

        <div id="password-wrapper" class="input-wrapper">
            <input type="password" id="password" class="custom-input">
        </div>

        <button id="login-btn" title="Увійти"></button>

    </div>

    <script>
        const emailInput = document.getElementById('email');
        const emailWrapper = document.getElementById('email-wrapper');
        const passwordInput = document.getElementById('password');
        const passwordWrapper = document.getElementById('password-wrapper');
        const loginBtn = document.getElementById('login-btn');

        // Зміна картинок для Email
        emailInput.addEventListener('focus', () => {
            emailWrapper.style.backgroundImage = "url('img/email_h.png')";
        });
        emailInput.addEventListener('blur', () => {
            emailWrapper.style.backgroundImage = "url('img/email.png')";
        });

        // Зміна картинок для Паролю
        passwordInput.addEventListener('focus', () => {
            passwordWrapper.style.backgroundImage = "url('img/password_h.png')";
        });
        passwordInput.addEventListener('blur', () => {
            passwordWrapper.style.backgroundImage = "url('img/password.png')";
        });

        // Клік по кнопці (для тесту)
        loginBtn.addEventListener('click', () => {
            console.log("Кнопку Login натиснуто!");
        });
    </script>

</body>
</html>
