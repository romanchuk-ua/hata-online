<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Авторизація</title>
    <style>
        /* Базові стилі */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #0f0f12; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Задній фон */
        .full-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('img/bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* Контейнер макета */
        .layout-container {
            position: relative;
            z-index: 2;
            pointer-events: none; 
            
            /* Масштабування */
            --design-width: 1281;
            --design-height: 584;
            --base-scale: 1vmin; 

            width: calc(var(--design-width) * var(--base-scale));
            height: calc(var(--design-height) * var(--base-scale));
            
            transition: transform 0.3s ease;
        }

        /* Спільні стилі для елементів */
        .ui-element {
            position: absolute;
            pointer-events: auto; 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Обгортка Email */
        #email-wrapper {
            top: calc(165 * var(--base-scale));
            right: calc(31 * var(--base-scale));
            width: calc(473 * var(--base-scale));
            height: calc(64 * var(--base-scale));
            background-image: url('img/email.png');
            display: flex;
            align-items: center;
        }

        /* Обгортка Паролю */
        #password-wrapper {
            top: calc(245 * var(--base-scale));
            right: calc(31 * var(--base-scale));
            width: calc(473 * var(--base-scale));
            height: calc(64 * var(--base-scale));
            background-image: url('img/password.png');
            display: flex;
            align-items: center;
        }

        /* Кнопка Логіну */
        #login-btn {
            top: calc(325 * var(--base-scale));
            right: calc(26 * var(--base-scale));
            width: calc(251 * var(--base-scale));
            height: calc(63 * var(--base-scale));
            background-image: url('img/login.png');
            background-color: transparent;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
            outline: none;
        }
        #login-btn:hover { opacity: 0.8; }
        #login-btn:active { transform: scale(0.98); }

        /* Поля введення */
        .custom-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff; 
            font-size: calc(18 * var(--base-scale)); 
            padding: 0 calc(20 * var(--base-scale)); 
            box-sizing: border-box;
            font-family: sans-serif;
        }

        /* Мобільна адаптація */
        @media screen and (orientation: portrait) {
            .layout-container {
                transform: rotate(90deg);
                --base-scale: calc(100vw / var(--design-height)); 
                width: calc(var(--design-width) * var(--base-scale));
                height: calc(var(--design-height) * var(--base-scale));
            }
        }
    </style>
</head>
<body>

    <div class="full-bg"></div>

    <div class="layout-container">
        
        <div id="email-wrapper" class="ui-element">
            <input type="email" id="email" class="custom-input" autocomplete="off">
        </div>

        <div id="password-wrapper" class="ui-element">
            <input type="password" id="password" class="custom-input">
        </div>

        <button id="login-btn" class="ui-element"></button>

    </div>

    <script>
        // Отримуємо всі потрібні елементи
        const emailInput = document.getElementById('email');
        const emailWrapper = document.getElementById('email-wrapper');
        
        const passwordInput = document.getElementById('password');
        const passwordWrapper = document.getElementById('password-wrapper');

        // Головна функція, яка оновлює картинки
        function updateStates() {
            // Перевіряємо Email: якщо активний АБО має введений текст
            if (emailInput === document.activeElement || emailInput.value.length > 0) {
                emailWrapper.style.backgroundImage = "url('img/email_h.png')";
            } else {
                emailWrapper.style.backgroundImage = "url('img/email.png')";
            }

            // Перевіряємо Пароль: якщо активний АБО має введений текст
            if (passwordInput === document.activeElement || passwordInput.value.length > 0) {
                passwordWrapper.style.backgroundImage = "url('img/password_h.png')";
            } else {
                passwordWrapper.style.backgroundImage = "url('img/password.png')";
            }
        }

        // Вішаємо події на Email (коли клікнули, коли прибрали курсор, коли ввели символ)
        emailInput.addEventListener('focus', updateStates);
        emailInput.addEventListener('blur', updateStates);
        emailInput.addEventListener('input', updateStates);

        // Вішаємо події на Пароль (коли клікнули, коли прибрали курсор, коли ввели символ)
        passwordInput.addEventListener('focus', updateStates);
        passwordInput.addEventListener('blur', updateStates);
        passwordInput.addEventListener('input', updateStates);
        
        // Початковий виклик, щоб перевірити, чи браузер випадково не автозаповнив поля при завантаженні сторінки
        updateStates();
    </script>

</body>
</html>
