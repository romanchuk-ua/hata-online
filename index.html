<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ігрове Меню Авторизації</title>
    <style>
        /* Скидаємо стандартні відступи */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Головний контейнер */
        .layout-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('img/bg.png');
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            transition: background-image 0.5s ease; /* Плавна зміна фону */
            --ch: 100vh; 
        }

        /* Контейнери для різних сцен */
        .scene {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: none; /* За замовчуванням усі сцени приховані, крім першої */
        }
        
        #login-scene {
            display: block; /* Перша сцена активна */
        }

        /* Спільні стилі для елементів інтерфейсу */
        .ui-element {
            position: absolute;
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
        }

        /* =========================================
           СЦЕНА 1: Авторизація
           ========================================= */
        #email-wrapper {
            top: calc(165 / 584 * 100%);
            right: calc(31 / 1281 * 100%);
            width: calc(473 / 1281 * 100%);
            height: calc(64 / 584 * 100%);
            background-image: url('img/email.png');
        }

        #password-wrapper {
            top: calc(245 / 584 * 100%);
            right: calc(31 / 1281 * 100%);
            width: calc(473 / 1281 * 100%);
            height: calc(64 / 584 * 100%);
            background-image: url('img/password.png');
        }

        #login-btn {
            top: calc(325 / 584 * 100%);
            right: calc(26 / 1281 * 100%);
            width: calc(251 / 1281 * 100%);
            height: calc(63 / 584 * 100%);
            background-image: url('img/login.png');
            background-color: transparent;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
            outline: none;
        }
        #login-btn:hover { opacity: 0.8; }
        #login-btn:active { transform: scale(0.98); }

        .custom-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: calc(var(--ch) * 0.035); 
            padding: 0 5%; 
            box-sizing: border-box;
        }

        /* Вікно помилки */
        #error-toast {
            position: absolute;
            bottom: 5%;
            left: 3%;
            background: rgba(40, 5, 5, 0.6); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 60, 60, 0.3);
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
            border-radius: 50px; 
            padding: calc(var(--ch) * 0.015) calc(var(--ch) * 0.03);
            display: flex;
            align-items: center;
            gap: calc(var(--ch) * 0.02);
            color: #ffcccc;
            font-size: calc(var(--ch) * 0.025);
            font-weight: 500;
            z-index: 100;
            pointer-events: auto;
            transform: translateX(-150%);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        #error-toast.show { transform: translateX(0); opacity: 1; }
        .toast-icon { display: flex; justify-content: center; align-items: center; background-color: #ff3b3b; color: #fff; width: calc(var(--ch) * 0.04); height: calc(var(--ch) * 0.04); border-radius: 50%; font-weight: bold; font-size: calc(var(--ch) * 0.025); }
        .toast-close { cursor: pointer; color: rgba(255, 255, 255, 0.5); font-size: calc(var(--ch) * 0.03); transition: color 0.2s ease; margin-left: calc(var(--ch) * 0.01); }
        .toast-close:hover { color: #fff; }

        /* =========================================
           СЦЕНА 2: Завантаження
           ========================================= */
        #progress-track {
            position: absolute;
            top: calc(556 / 584 * 100%);
            left: calc(82 / 1281 * 100%);
            width: calc(1117 / 1281 * 100%);
            height: calc(10 / 584 * 100%);
            background-color: #494949; 
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%; 
            height: 100%;
            background-color: #F1FE3F; 
            box-shadow: 0 0 10px rgba(241, 254, 63, 0.5); 
        }

        /* =========================================
           СЦЕНА 3: Підключення до сервера (next.png)
           ========================================= */
        #connecting-text {
            position: absolute;
            top: calc(549 / 584 * 100%);
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: calc(var(--ch) * 0.035);
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            white-space: nowrap;
        }

        #disconnect-btn {
            top: calc(501 / 584 * 100%);
            left: calc(1012 / 1281 * 100%); /* Відступ зліва */
            width: calc(251 / 1281 * 100%);
            height: calc(63 / 584 * 100%);
            background-image: url('img/disconnect.png');
            background-color: transparent;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
            outline: none;
        }
        #disconnect-btn:hover { opacity: 0.8; }
        #disconnect-btn:active { transform: scale(0.98); }

        /* =========================================
           СЦЕНА 4: Вибір спавну (spawn.png)
           ========================================= */
        #vokzal-img {
            top: calc(373 / 584 * 100%);
            left: calc(391 / 1281 * 100%);
            width: calc(233 / 1281 * 100%);
            height: calc(179 / 584 * 100%);
            background-image: url('img/vokzal.png');
            cursor: pointer;
            transition: transform 0.2s;
        }
        #vokzal-img:hover { transform: scale(1.05); } /* Ефект при наведенні */

        #last-img {
            top: calc(373 / 584 * 100%);
            left: calc(657 / 1281 * 100%);
            width: calc(233 / 1281 * 100%);
            height: calc(179 / 584 * 100%);
            background-image: url('img/last.png');
            cursor: pointer;
            transition: transform 0.2s;
        }
        #last-img:hover { transform: scale(1.05); } /* Ефект при наведенні */

        /* =========================================
           Мобільна адаптація
           ========================================= */
        @media screen and (orientation: portrait) {
            .layout-container {
                width: 100vh;
                height: 100vw;
                top: 0;
                left: 100vw;
                transform-origin: top left;
                transform: rotate(90deg);
                --ch: 100vw; 
            }
        }
    </style>
</head>
<body>

    <div class="layout-container" id="main-container">
        
        <div class="scene" id="login-scene">
            <div id="email-wrapper" class="ui-element">
                <input type="text" id="email" class="custom-input" autocomplete="off">
            </div>

            <div id="password-wrapper" class="ui-element">
                <input type="password" id="password" class="custom-input">
            </div>

            <button id="login-btn" class="ui-element"></button>

            <div id="error-toast">
                <div class="toast-icon">!</div>
                <div class="toast-text">Невірно введені дані</div>
                <div class="toast-close" id="toast-close-btn">✕</div>
            </div>
        </div>

        <div class="scene" id="loading-scene">
            <div id="progress-track">
                <div id="progress-fill"></div>
            </div>
        </div>

        <div class="scene" id="next-scene">
            <div id="connecting-text">Підключення до сервера<span id="connecting-dots">...</span></div>
            <button id="disconnect-btn" class="ui-element"></button>
        </div>

        <div class="scene" id="spawn-scene">
            <div id="vokzal-img" class="ui-element"></div>
            <div id="last-img" class="ui-element"></div>
        </div>

    </div>

    <script>
        // Елементи
        const emailInput = document.getElementById('email');
        const emailWrapper = document.getElementById('email-wrapper');
        const passwordInput = document.getElementById('password');
        const passwordWrapper = document.getElementById('password-wrapper');
        const loginBtn = document.getElementById('login-btn');

        const mainContainer = document.getElementById('main-container');
        const loginScene = document.getElementById('login-scene');
        const loadingScene = document.getElementById('loading-scene');
        const nextScene = document.getElementById('next-scene');
        const spawnScene = document.getElementById('spawn-scene');
        const progressFill = document.getElementById('progress-fill');
        
        // Елементи 3-ї сцени
        const connectingDots = document.getElementById('connecting-dots');
        const disconnectBtn = document.getElementById('disconnect-btn');

        const errorToast = document.getElementById('error-toast');
        const toastCloseBtn = document.getElementById('toast-close-btn');
        
        let hideToastTimeout;
        let connectionTimeout;
        let dotsInterval;

        // Логіка зміни картинок (email_h, password_h)
        function updateStates() {
            if (emailInput === document.activeElement || emailInput.value.length > 0) {
                emailWrapper.style.backgroundImage = "url('img/email_h.png')";
            } else {
                emailWrapper.style.backgroundImage = "url('img/email.png')";
            }

            if (passwordInput === document.activeElement || passwordInput.value.length > 0) {
                passwordWrapper.style.backgroundImage = "url('img/password_h.png')";
            } else {
                passwordWrapper.style.backgroundImage = "url('img/password.png')";
            }
        }

        emailInput.addEventListener('focus', updateStates);
        emailInput.addEventListener('blur', updateStates);
        emailInput.addEventListener('input', updateStates);
        passwordInput.addEventListener('focus', updateStates);
        passwordInput.addEventListener('blur', updateStates);
        passwordInput.addEventListener('input', updateStates);
        updateStates();

        // Функція показу помилки вводу
        function showError() {
            clearTimeout(hideToastTimeout);
            errorToast.classList.add('show');
            hideToastTimeout = setTimeout(() => {
                errorToast.classList.remove('show');
            }, 4000);
        }

        toastCloseBtn.addEventListener('click', () => {
            clearTimeout(hideToastTimeout);
            errorToast.classList.remove('show');
        });

        // ПОВЕРНЕННЯ В ГОЛОВНЕ МЕНЮ (кнопка Disconnect)
        function resetToMenu() {
            // Зупиняємо таймери та анімації
            clearTimeout(connectionTimeout);
            clearInterval(dotsInterval);

            // Очищаємо поля
            emailInput.value = "";
            passwordInput.value = "";
            updateStates();

            // Скидаємо смугу завантаження
            progressFill.style.transition = 'none';
            progressFill.style.width = '0%';

            // Ховаємо всі сцени
            loadingScene.style.display = 'none';
            nextScene.style.display = 'none';
            spawnScene.style.display = 'none';

            // Повертаємо головне меню
            mainContainer.style.backgroundImage = "url('img/bg.png')";
            loginScene.style.display = 'block';
        }

        disconnectBtn.addEventListener('click', resetToMenu);

        // Натискання на Логін
        loginBtn.addEventListener('click', () => {
            
            if (emailInput.value === "litynskyiroman2023@gmail.com" && passwordInput.value === "l020712r") {
                
                // --- 1. ПЕРЕХІД ДО ЗАВАНТАЖЕННЯ ---
                loginScene.style.display = 'none';
                mainContainer.style.backgroundImage = "url('img/game_load.png')";
                loadingScene.style.display = 'block';

                const randomLoadTime = Math.floor(Math.random() * (13000 - 7000 + 1)) + 7000;

                setTimeout(() => {
                    progressFill.style.transition = `width ${randomLoadTime}ms linear`;
                    progressFill.style.width = '100%';
                }, 50);

                // Після закінчення завантаження
                setTimeout(() => {
                    // --- 2. ПЕРЕХІД ДО ЕКРАНУ ПІДКЛЮЧЕННЯ (next.png) ---
                    loadingScene.style.display = 'none';
                    mainContainer.style.backgroundImage = "url('img/next.png')";
                    nextScene.style.display = 'block';

                    // Анімація крапочок
                    let dotCount = 0;
                    dotsInterval = setInterval(() => {
                        dotCount = (dotCount + 1) % 4; // Рахує: 0, 1, 2, 3
                        connectingDots.textContent = '.'.repeat(dotCount);
                    }, 500); // Кожні 500 мілісекунд (півсекунди)

                    // Рандомний час підключення (від 5 до 9 секунд)
                    const connectTime = Math.floor(Math.random() * (9000 - 5000 + 1)) + 5000;

                    connectionTimeout = setTimeout(() => {
                        // Зупиняємо крапочки
                        clearInterval(dotsInterval);

                        // --- 3. ПЕРЕХІД ДО ЕКРАНУ СПАВНУ (spawn.png) ---
                        nextScene.style.display = 'none';
                        mainContainer.style.backgroundImage = "url('img/spawn.png')";
                        spawnScene.style.display = 'block';
                        
                    }, connectTime);

                }, randomLoadTime + 50);

            } else {
                showError();
            }
        });
    </script>

</body>
</html>
