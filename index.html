<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Авторизація</title>
    <style>
        /* Скидаємо стандартні відступи */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Ніяких скролів */
            background-color: #000;
            font-family: sans-serif;
        }

        /* Контейнер, який повністю заповнює екран (100% ширини і висоти) */
        .layout-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('img/bg.png');
            background-size: 100% 100%; /* Розтягуємо фон точно по екрану */
            background-repeat: no-repeat;
            --ch: 100vh; /* Змінна для правильного розміру шрифту */
        }

        /* Спільні стилі для елементів інтерфейсу */
        .ui-element {
            position: absolute;
            background-size: 100% 100%; /* Картинки кнопок розтягуються разом з макетом */
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
        }

        /* Email: перевели пікселі з Figma у відсотки */
        #email-wrapper {
            top: calc(165 / 584 * 100%);
            right: calc(31 / 1281 * 100%);
            width: calc(473 / 1281 * 100%);
            height: calc(64 / 584 * 100%);
            background-image: url('img/email.png');
        }

        /* Password: перевели пікселі з Figma у відсотки */
        #password-wrapper {
            top: calc(245 / 584 * 100%);
            right: calc(31 / 1281 * 100%);
            width: calc(473 / 1281 * 100%);
            height: calc(64 / 584 * 100%);
            background-image: url('img/password.png');
        }

        /* Кнопка Логін: перевели пікселі з Figma у відсотки */
        #login-btn {
            top: calc(325 / 584 * 100%);
            right: calc(26 / 1281 * 100%);
            width: calc(251 / 1281 * 100%);
            height: calc(63 / 584 * 100%);
            background-image: url('img/login.png');
            background-color: transparent;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
            outline: none;
        }
        
        #login-btn:hover { opacity: 0.8; }
        #login-btn:active { transform: scale(0.98); }

        /* Внутрішні текстові поля */
        .custom-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: calc(var(--ch) * 0.035); /* Розмір шрифту ідеально адаптується */
            padding: 0 5%; /* Гнучкий внутрішній відступ */
            box-sizing: border-box;
        }

        /* =========================================
           Мобільна адаптація (Поворот на 90 градусів)
           ========================================= */
        @media screen and (orientation: portrait) {
            .layout-container {
                /* Міняємо місцями ширину та висоту */
                width: 100vh;
                height: 100vw;
                
                /* Центруємо і повертаємо рівно по екрану телефона */
                top: 0;
                left: 100vw;
                transform-origin: top left;
                transform: rotate(90deg);
                
                --ch: 100vw; /* Висота контейнера тепер дорівнює ширині телефона */
            }
        }
    </style>
</head>
<body>

    <div class="layout-container">
        
        <div id="email-wrapper" class="ui-element">
            <input type="text" id="email" class="custom-input" autocomplete="off">
        </div>

        <div id="password-wrapper" class="ui-element">
            <input type="password" id="password" class="custom-input">
        </div>

        <button id="login-btn" class="ui-element"></button>

    </div>

    <script>
        const emailInput = document.getElementById('email');
        const emailWrapper = document.getElementById('email-wrapper');
        
        const passwordInput = document.getElementById('password');
        const passwordWrapper = document.getElementById('password-wrapper');

        function updateStates() {
            // Перевіряємо Email
            if (emailInput === document.activeElement || emailInput.value.length > 0) {
                emailWrapper.style.backgroundImage = "url('img/email_h.png')";
            } else {
                emailWrapper.style.backgroundImage = "url('img/email.png')";
            }

            // Перевіряємо Password
            if (passwordInput === document.activeElement || passwordInput.value.length > 0) {
                passwordWrapper.style.backgroundImage = "url('img/password_h.png')";
            } else {
                passwordWrapper.style.backgroundImage = "url('img/password.png')";
            }
        }

        // Слухаємо події для полів
        emailInput.addEventListener('focus', updateStates);
        emailInput.addEventListener('blur', updateStates);
        emailInput.addEventListener('input', updateStates);

        passwordInput.addEventListener('focus', updateStates);
        passwordInput.addEventListener('blur', updateStates);
        passwordInput.addEventListener('input', updateStates);
        
        // Виклик при завантаженні (якщо браузер сам вставив збережений пароль)
        updateStates();
    </script>

</body>
</html>
