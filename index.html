<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма авторизації</title>
    <style>
        /* Скидання стандартних відступів */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Забираємо скроли, якщо вони не потрібні */
        }

        /* Задній фон на весь екран */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('img/bg.png');
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Спільні стилі для контейнерів інпутів */
        .input-wrapper {
            position: absolute;
            right: 31px; /* Відступ справа для обох блоків */
            /* ЗМІНИ ЦІ РОЗМІРИ ПІД СВОЇ ЗОБРАЖЕННЯ З FIGMA */
            width: 250px; 
            height: 50px;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
        }

        /* Позиціонування і фон для Email */
        #email-wrapper {
            top: 165px;
            background-image: url('img/email.png');
        }

        /* Позиціонування і фон для Password */
        #password-wrapper {
            top: 245px;
            background-image: url('img/password.png');
        }

        /* Стилі самого текстового поля всередині картинки */
        .custom-input {
            width: 100%;
            height: 100%;
            background: transparent; /* Прозорий фон, щоб було видно картинку */
            border: none;            /* Без рамок */
            outline: none;           /* Без обводки при кліку */
            color: #ffffff;          /* Білий текст */
            padding: 0 15px;         /* Відступи тексту від країв картинки */
            box-sizing: border-box;
            font-size: 16px;
            font-family: sans-serif;
        }

        /* Колір тексту-підказки (placeholder), якщо він потрібен */
        .custom-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="background">
        <div id="email-wrapper" class="input-wrapper">
            <input type="text" id="email" class="custom-input">
        </div>

        <div id="password-wrapper" class="input-wrapper">
            <input type="password" id="password" class="custom-input">
        </div>
    </div>

    <script>
        // Отримуємо елементи
        const emailInput = document.getElementById('email');
        const emailWrapper = document.getElementById('email-wrapper');

        const passwordInput = document.getElementById('password');
        const passwordWrapper = document.getElementById('password-wrapper');

        // Логіка для поля Email: змінюємо фон при фокусі та втраті фокусу
        emailInput.addEventListener('focus', () => {
            emailWrapper.style.backgroundImage = "url('img/email_h.png')";
        });
        emailInput.addEventListener('blur', () => {
            emailWrapper.style.backgroundImage = "url('img/email.png')";
        });

        // Логіка для поля Password: змінюємо фон при фокусі та втраті фокусу
        passwordInput.addEventListener('focus', () => {
            passwordWrapper.style.backgroundImage = "url('img/password_h.png')";
        });
        passwordInput.addEventListener('blur', () => {
            passwordWrapper.style.backgroundImage = "url('img/password.png')";
        });
    </script>

</body>
</html>
