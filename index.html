<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизація</title>
    <style>
        /* Базові стилі для повного екрану */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f0f12; /* Темний фон навколо макета, якщо екран більший */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Головний контейнер за розміром вашої Figma-фрейму */
        .page-container {
            position: relative;
            width: 1281px;
            height: 584px;
            background-image: url('img/bg.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5); /* Ефектна тінь для макета */
        }

        /* Стилі для обгорток Email та Password */
        .input-wrapper {
            position: absolute;
            right: 31px;      /* Відступ справа з Figma */
            width: 473px;     /* Точна ширина з Figma */
            height: 64px;     /* Точна висота з Figma */
            background-size: 100% 100%;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
        }

        /* Позиціонування Email */
        #email-wrapper {
            top: 165px;       /* Відступ зверху з Figma */
            background-image: url('img/email.png');
        }

        /* Позиціонування Password */
        #password-wrapper {
            top: 245px;       /* Відступ зверху з Figma */
            background-image: url('img/password.png');
        }

        /* Стилі для самих інпутів всередині картинок */
        .custom-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;      /* Білий колір тексту */
            font-size: 16px;
            padding: 0 24px;     /* Внутрішній відступ, щоб текст не прилипав до країв */
            box-sizing: border-box;
        }

        /* Кнопка Логіну */
        #login-btn {
            position: absolute;
            top: 325px;          /* Відступ зверху з Figma */
            right: 26px;         /* Відступ справа з Figma */
            width: 251px;        /* Ширина кнопки */
            height: 63px;        /* Висота кнопки */
            background-image: url('img/login.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-color: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.1s ease;
        }

        /* Ефект при наведенні та кліку на кнопку */
        #login-btn:hover {
            opacity: 0.9;
        }
        #login-btn:active {
            transform: scale(0.98); /* Легке натискання */
        }
    </style>
</head>
<body>

    <div class="page-container">
        
        <div id="email-wrapper" class="input-wrapper">
            <input type="text" id="email" class="custom-input" autocomplete="off">
        </div>

        <div id="password-wrapper" class="input-wrapper">
            <input type="password" id="password" class="custom-input">
        </div>

        <button id="login-btn" id="login" title="Увійти"></button>

    </div>

    <script>
        // Елементи Email
        const emailInput = document.getElementById('email');
        const emailWrapper = document.getElementById('email-wrapper');

        // Елементи Password
        const passwordInput = document.getElementById('password');
        const passwordWrapper = document.getElementById('password-wrapper');

        // Кнопка Login
        const loginBtn = document.getElementById('login-btn');

        // Зміна картинок для Email при фокусі
        emailInput.addEventListener('focus', () => {
            emailWrapper.style.backgroundImage = "url('img/email_h.png')";
        });
        emailInput.addEventListener('blur', () => {
            emailWrapper.style.backgroundImage = "url('img/email.png')";
        });

        // Зміна картинок для Паролю при фокусі
        passwordInput.addEventListener('focus', () => {
            passwordWrapper.style.backgroundImage = "url('img/password_h.png')";
        });
        passwordInput.addEventListener('blur', () => {
            passwordWrapper.style.backgroundImage = "url('img/password.png')";
        });

        // Проста перевірка кліку на кнопку (для тесту)
        loginBtn.addEventListener('click', () => {
            console.log("Кнопку Login натиснуто!");
            // Тут можна додати перевірку введених даних
        });
    </script>

</body>
</html>
