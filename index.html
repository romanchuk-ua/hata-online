<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Авторизація</title>
    <style>
        /* Базові стилі */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #000; /* Чорний фон на випадок завантаження */
            font-family: sans-serif;
        }

        /* Задній фон */
        .full-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            /* Центруємо фон */
            transform: translate(-50%, -50%);
            background-image: url('img/bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* Контейнер макета (фіксовані розміри з Figma) */
        .layout-container {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 1281px;
            height: 584px;
            /* Масштабуємо макет під екран:
               min(1, ...) означає, що макет ніколи не буде більшим за 100% (не буде гігантським на ПК),
               але якщо екран менший - він пропорційно зменшиться (95vw/95vh залишає невеликі відступи по краях)
            */
            transform: translate(-50%, -50%) scale(min(1, min(95vw / 1281, 95vh / 584)));
            z-index: 2;
        }

        /* Спільні стилі для обгорток (позиції точно як у Figma) */
        .input-wrapper {
            position: absolute;
            right: 31px;
            width: 473px;
            height: 64px;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
        }

        #email-wrapper {
            top: 165px;
            background-image: url('img/email.png');
        }

        #password-wrapper {
            top: 245px;
            background-image: url('img/password.png');
        }

        /* Кнопка Логіну */
        #login-btn {
            position: absolute;
            top: 325px;
            right: 26px;
            width: 251px;
            height: 63px;
            background-image: url('img/login.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-color: transparent;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
            outline: none;
        }
        #login-btn:hover { opacity: 0.8; }
        #login-btn:active { transform: scale(0.98); }

        /* Поля введення */
        .custom-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff; 
            font-size: 18px; /* Розмір тексту автоматично масштабується разом з контейнером */
            padding: 0 24px; 
            box-sizing: border-box;
        }

        /* =========================================
           Мобільна адаптація (Вертикальний екран)
           ========================================= */
        @media screen and (orientation: portrait) {
            
            /* Перевертаємо задній фон на 90 градусів */
            .full-bg {
                /* Міняємо місцями ширину і висоту, щоб при повороті фон заповнив екран */
                width: 100vh;
                height: 100vw;
                transform: translate(-50%, -50%) rotate(90deg);
            }

            /* Перевертаємо макет з інпутами на 90 градусів */
            .layout-container {
                /* Рахуємо масштаб для перевернутого стану (міняємо місцями vw та vh) */
                transform: translate(-50%, -50%) rotate(90deg) scale(min(1, min(95vh / 1281, 95vw / 584)));
            }
        }
    </style>
</head>
<body>

    <div class="full-bg"></div>

    <div class="layout-container">
        
        <div id="email-wrapper" class="input-wrapper">
            <input type="text" id="email" class="custom-input" autocomplete="off">
        </div>

        <div id="password-wrapper" class="input-wrapper">
            <input type="password" id="password" class="custom-input">
        </div>

        <button id="login-btn"></button>

    </div>

    <script>
        const emailInput = document.getElementById('email');
        const emailWrapper = document.getElementById('email-wrapper');
        
        const passwordInput = document.getElementById('password');
        const passwordWrapper = document.getElementById('password-wrapper');

        // Функція перевірки та оновлення картинок
        function updateStates() {
            // Email: змінюємо картинку, якщо поле у фокусі АБО в ньому є текст
            if (emailInput === document.activeElement || emailInput.value.length > 0) {
                emailWrapper.style.backgroundImage = "url('img/email_h.png')";
            } else {
                emailWrapper.style.backgroundImage = "url('img/email.png')";
            }

            // Пароль: змінюємо картинку, якщо поле у фокусі АБО в ньому є текст
            if (passwordInput === document.activeElement || passwordInput.value.length > 0) {
                passwordWrapper.style.backgroundImage = "url('img/password_h.png')";
            } else {
                passwordWrapper.style.backgroundImage = "url('img/password.png')";
            }
        }

        // Події для Email
        emailInput.addEventListener('focus', updateStates);
        emailInput.addEventListener('blur', updateStates);
        emailInput.addEventListener('input', updateStates);

        // Події для Паролю
        passwordInput.addEventListener('focus', updateStates);
        passwordInput.addEventListener('blur', updateStates);
        passwordInput.addEventListener('input', updateStates);
        
        // Викликаємо один раз при старті
        updateStates();
    </script>

</body>
</html>
