<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Авторизація та Завантаження</title>
    <style>
        /* Скидаємо стандартні відступи */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #000;
            font-family: sans-serif;
        }

        /* Головний контейнер */
        .layout-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Початковий фон - меню входу */
            background-image: url('img/bg.png');
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            --ch: 100vh; 
        }

        /* Контейнери для різних сцен */
        .scene {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Сцена завантаження прихована за замовчуванням */
        #loading-scene {
            display: none;
        }

        /* Спільні стилі для елементів інтерфейсу */
        .ui-element {
            position: absolute;
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
        }

        /* Email */
        #email-wrapper {
            top: calc(165 / 584 * 100%);
            right: calc(31 / 1281 * 100%);
            width: calc(473 / 1281 * 100%);
            height: calc(64 / 584 * 100%);
            background-image: url('img/email.png');
        }

        /* Password */
        #password-wrapper {
            top: calc(245 / 584 * 100%);
            right: calc(31 / 1281 * 100%);
            width: calc(473 / 1281 * 100%);
            height: calc(64 / 584 * 100%);
            background-image: url('img/password.png');
        }

        /* Кнопка Логін */
        #login-btn {
            top: calc(325 / 584 * 100%);
            right: calc(26 / 1281 * 100%);
            width: calc(251 / 1281 * 100%);
            height: calc(63 / 584 * 100%);
            background-image: url('img/login.png');
            background-color: transparent;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
            outline: none;
        }
        
        #login-btn:hover { opacity: 0.8; }
        #login-btn:active { transform: scale(0.98); }

        /* Внутрішні текстові поля */
        .custom-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: calc(var(--ch) * 0.035); 
            padding: 0 5%; 
            box-sizing: border-box;
        }

        /* =========================================
           Елементи екрану завантаження
           ========================================= */
        #progress-track {
            position: absolute;
            top: calc(556 / 584 * 100%);
            left: calc(82 / 1281 * 100%);
            width: calc(1117 / 1281 * 100%);
            height: calc(10 / 584 * 100%);
            background-color: #494949; /* Сірий фон смуги */
        }

        #progress-fill {
            width: 0%; /* Початкова ширина */
            height: 100%;
            background-color: #F1FE3F; /* Колір завантаження */
            /* Плавність буде задаватись через JS динамічно */
        }

        /* =========================================
           Мобільна адаптація (Поворот на 90 градусів)
           ========================================= */
        @media screen and (orientation: portrait) {
            .layout-container {
                width: 100vh;
                height: 100vw;
                top: 0;
                left: 100vw;
                transform-origin: top left;
                transform: rotate(90deg);
                --ch: 100vw; 
            }
        }
    </style>
</head>
<body>

    <div class="layout-container" id="main-container">
        
        <div class="scene" id="login-scene">
            <div id="email-wrapper" class="ui-element">
                <input type="text" id="email" class="custom-input" autocomplete="off">
            </div>

            <div id="password-wrapper" class="ui-element">
                <input type="password" id="password" class="custom-input">
            </div>

            <button id="login-btn" class="ui-element"></button>
        </div>

        <div class="scene" id="loading-scene">
            <div id="progress-track">
                <div id="progress-fill"></div>
            </div>
        </div>

    </div>

    <script>
        // Елементи логіну
        const emailInput = document.getElementById('email');
        const emailWrapper = document.getElementById('email-wrapper');
        const passwordInput = document.getElementById('password');
        const passwordWrapper = document.getElementById('password-wrapper');
        const loginBtn = document.getElementById('login-btn');

        // Елементи для перемикання сцен
        const mainContainer = document.getElementById('main-container');
        const loginScene = document.getElementById('login-scene');
        const loadingScene = document.getElementById('loading-scene');
        const progressFill = document.getElementById('progress-fill');

        // Логіка зміни картинок полів вводу
        function updateStates() {
            if (emailInput === document.activeElement || emailInput.value.length > 0) {
                emailWrapper.style.backgroundImage = "url('img/email_h.png')";
            } else {
                emailWrapper.style.backgroundImage = "url('img/email.png')";
            }

            if (passwordInput === document.activeElement || passwordInput.value.length > 0) {
                passwordWrapper.style.backgroundImage = "url('img/password_h.png')";
            } else {
                passwordWrapper.style.backgroundImage = "url('img/password.png')";
            }
        }

        emailInput.addEventListener('focus', updateStates);
        emailInput.addEventListener('blur', updateStates);
        emailInput.addEventListener('input', updateStates);

        passwordInput.addEventListener('focus', updateStates);
        passwordInput.addEventListener('blur', updateStates);
        passwordInput.addEventListener('input', updateStates);
        
        updateStates();

        // Логіка натискання на кнопку входу
        loginBtn.addEventListener('click', () => {
            // 1. Ховаємо поля вводу і кнопку
            loginScene.style.display = 'none';

            // 2. Змінюємо задній фон на зображення загрузки
            mainContainer.style.backgroundImage = "url('img/game_load.png')";

            // 3. Показуємо сцену із смугою завантаження
            loadingScene.style.display = 'block';

            // 4. Генеруємо випадковий час у мілісекундах: від 7000мс (7с) до 13000мс (13с)
            const randomLoadTime = Math.floor(Math.random() * (13000 - 7000 + 1)) + 7000;

            // 5. Запускаємо анімацію завантаження
            // Використовуємо setTimeout на 50мс, щоб браузер встиг відобразити сцену перед початком анімації
            setTimeout(() => {
                progressFill.style.transition = `width ${randomLoadTime}ms linear`;
                progressFill.style.width = '100%';
            }, 50);

            // 6. Перехід на іншу сторінку після завершення анімації
            setTimeout(() => {
                window.location.href = 'game.html';
            }, randomLoadTime + 50);
        });
    </script>

</body>
</html>
